name: Notifier

on:
  push:
    branches: [ main ]

jobs:

  notifyTelegram:
    runs-on: ubuntu-latest
    steps:
    - name: send custom message
      uses: appleboy/telegram-action@4cd2253b24c9682a5be99eb6f7ab3484586978fa # master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        format: markdown
        message: |
          GitHub commit: *${{ github.event.commits[0].message }}*
          
          Committed by ${{ github.actor }} to ${{ github.repository }}
          [view details](https://github.com/${{ github.repository }}/commit/${{github.sha}})
