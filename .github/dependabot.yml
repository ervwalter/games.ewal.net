version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    assignees:
      - "ervwalter"
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 5
    groups:
      npm-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      npm-major:
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    assignees:
      - "ervwalter"
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 5
    groups:
      docker-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      docker-major:
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: "nuget"
    directory: "/cache-updater"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
