      prefix: "deps"
    cooldown:
      default-days: 5
    groups:
      nuget-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      nuget-major:
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: "docker"
    directory: "/cache-updater"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    assignees:
      - "ervwalter"
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 5
    groups:
      docker-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      docker-major:
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    assignees:
      - "ervwalter"
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 5
    groups:
      github-actions-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      github-actions-major:
        patterns: ["*"]
        update-types: ["major"]
